{% extends "index.html" %}
{% block content %}
    <h2 class="text-xl font-semibold mb-4">{{ 'Редактировать эксперта' if expert else 'Добавить эксперта' }}</h2>
    <form method="POST" action="{{ url_for('edit_expert', id=expert[0]) if expert else url_for('add_expert') }}" class="space-y-4 max-w-lg">
        <div>
            <label for="name" class="block">Имя:</label>
            <input type="text" id="name" name="name" class="border p-2 w-full" value="{{ expert[1] if expert else '' }}" required>
        </div>
        <div class="flex gap-2">
            <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded">{{ 'Сохранить изменения' if expert else 'Сохранить' }}</button>
            {% if expert %}<a href="{{ url_for('list_experts') }}" class="bg-gray-500 text-white px-4 py-2 rounded">Отмена</a>{% endif %}
        </div>
    </form>
{% endblock %}
