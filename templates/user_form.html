{% extends "index.html" %}
{% block content %}
    <h2 class="text-xl font-semibold mb-4">{{ 'Редактировать пользователя' if user else 'Добавить пользователя' }}</h2>
    <form method="POST" action="{{ url_for('edit_user', id=user[0]) if user else url_for('add_user') }}" class="space-y-4 max-w-lg">
        <div>
            <label for="username" class="block">Имя пользователя:</label>
            <input type="text" id="username" name="username" class="border p-2 w-full" value="{{ user[1] if user else '' }}" required>
        </div>
        <div>
            <label for="password" class="block">{{ 'Новый пароль:' if user else 'Пароль:' }}</label>
            <input type="password" id="password" name="password" class="border p-2 w-full" {% if not user %}required{% endif %}>
            {% if user %}<p class="text-sm text-gray-600 mt-1">Оставьте поле пустым, чтобы сохранить текущий пароль.</p>{% endif %}
        </div>
        <div>
            <label for="role" class="block">Роль:</label>
            <select id="role" name="role" class="border p-2 w-full" required onchange="toggleExpertSelect()">
                {% for value, label in roles %}
                    <option value="{{ value }}" {% if user and user[2] == value %}selected{% endif %}>{{ label }}</option>
                {% endfor %}
            </select>
        </div>
        <div id="expert_select_div">
            <label for="expert_id" class="block">Эксперт:</label>
            <select id="expert_id" name="expert_id" class="border p-2 w-full">
                <option value="">Выберите эксперта</option>
                {% for expert in experts %}
                    <option value="{{ expert[0] }}" {% if user and user[3] == expert[0] %}selected{% endif %}>{{ expert[1] }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="flex gap-2">
            <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded">{{ 'Сохранить изменения' if user else 'Создать' }}</button>
            {% if user %}<a href="{{ url_for('list_users') }}" class="bg-gray-500 text-white px-4 py-2 rounded">Отмена</a>{% endif %}
        </div>
    </form>
    <script>
        function toggleExpertSelect() {
            const role = document.getElementById('role').value;
            const expertDiv = document.getElementById('expert_select_div');
            const expertSelect = document.getElementById('expert_id');
            if (role === 'expert') {
                expertDiv.style.display = 'block';
                expertSelect.required = true;
            } else {
                expertDiv.style.display = 'none';
                expertSelect.required = false;
                expertSelect.value = '';
            }
        }
        toggleExpertSelect();
    </script>
{% endblock %}
