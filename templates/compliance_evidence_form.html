{% extends "index.html" %}
{% block content %}
<div class="bg-white border border-gray-200 rounded p-4">
    <div class="flex flex-wrap justify-between items-start gap-3 mb-4">
        <div>
            <h2 class="text-xl font-semibold">Evidence соответствия</h2>
            <p class="text-sm text-gray-600">{{ item[6] }} {{ item[7] or '' }} / {{ item[8] }} - {{ item[9] }}</p>
        </div>
        <a href="{{ url_for('compliance_dashboard') }}" class="bg-gray-500 text-white px-4 py-2 rounded">К compliance</a>
    </div>
    <form method="POST" class="space-y-4">
        <div>
            <label class="block font-semibold mb-1">Домен</label>
            <div class="border rounded p-2 bg-gray-50">{{ item[10] or '-' }}</div>
        </div>
        <div>
            <label class="block font-semibold mb-1">Описание требования</label>
            <div class="border rounded p-2 bg-gray-50">{{ item[11] or '' }}</div>
        </div>
        <div>
            <label class="block font-semibold mb-1">Связанная мера</label>
            <div class="border rounded p-2 bg-gray-50">{{ item[12] or '-' }}{% if item[13] %} / {{ item[13] }}{% endif %}</div>
        </div>
        <div>
            <label class="block font-semibold mb-1">Статус</label>
            <select name="status" class="border p-2 w-full">
                {% for status in statuses %}
                    <option value="{{ status }}" {% if item[3] == status %}selected{% endif %}>{{ status }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block font-semibold mb-1">Owner</label>
            <select name="owner_user_id" class="border p-2 w-full">
                <option value="">Не назначен</option>
                {% for user in users %}
                    <option value="{{ user[0] }}" {% if item[5] == user[0] %}selected{% endif %}>{{ user[1] }} - {{ user[2] | role_label }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="block font-semibold mb-1">Evidence</label>
            <textarea name="evidence" rows="5" class="border p-2 w-full">{{ item[4] or '' }}</textarea>
        </div>
        <button class="bg-blue-500 text-white px-4 py-2 rounded" type="submit">Сохранить</button>
    </form>
</div>
{% endblock %}
