<svg viewBox="0 0 1020 560" width="1020" height="560" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif" font-size="11" style="background:#f8fafc">
  <rect x="0" y="0" width="1020" height="560" fill="#f8fafc" rx="10"/>
  <text x="510" y="16" text-anchor="middle" font-size="13" font-weight="800" fill="#0f172a">Figure 4. Sequence diagram — risk computation and recommendation pipeline</text>

  <!-- lifeline headers -->
  <rect x="30"  y="26" width="110" height="36" rx="6" fill="#0891b2" stroke="#0e7490"/>
  <text x="85"  y="48" text-anchor="middle" fill="white" font-weight="700" font-size="11">Process Owner</text>

  <rect x="190" y="26" width="110" height="36" rx="6" fill="#2563eb" stroke="#1d4ed8"/>
  <text x="245" y="48" text-anchor="middle" fill="white" font-weight="700" font-size="11">Flask Router</text>

  <rect x="350" y="26" width="110" height="36" rx="6" fill="#7c3aed" stroke="#6d28d9"/>
  <text x="405" y="42" text-anchor="middle" fill="white" font-weight="700" font-size="11">risk_service</text>
  <text x="405" y="56" text-anchor="middle" fill="white" font-size="10">.py</text>

  <rect x="510" y="26" width="110" height="36" rx="6" fill="#ca8a04" stroke="#a16207"/>
  <text x="565" y="42" text-anchor="middle" fill="white" font-weight="700" font-size="11">ai/risk_</text>
  <text x="565" y="56" text-anchor="middle" fill="white" font-size="10">recommender.py</text>

  <rect x="670" y="26" width="110" height="36" rx="6" fill="#16a34a" stroke="#15803d"/>
  <text x="725" y="48" text-anchor="middle" fill="white" font-weight="700" font-size="11">SQLite DB</text>

  <rect x="830" y="26" width="110" height="36" rx="6" fill="#475569" stroke="#334155"/>
  <text x="885" y="48" text-anchor="middle" fill="white" font-weight="700" font-size="11">audit_log</text>

  <!-- lifelines (vertical dashed) -->
  <line x1="85"  y1="62" x2="85"  y2="546" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="245" y1="62" x2="245" y2="546" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="405" y1="62" x2="405" y2="546" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="565" y1="62" x2="565" y2="546" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="725" y1="62" x2="725" y2="546" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="885" y1="62" x2="885" y2="546" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- activation boxes -->
  <rect x="80"  y="96"  width="10" height="430" rx="2" fill="#0891b2" opacity="0.3"/>
  <rect x="240" y="111" width="10" height="415" rx="2" fill="#2563eb" opacity="0.3"/>
  <rect x="400" y="181" width="10" height="80"  rx="2" fill="#7c3aed" opacity="0.3"/>
  <rect x="560" y="276" width="10" height="50"  rx="2" fill="#ca8a04" opacity="0.3"/>
  <rect x="720" y="346" width="10" height="90"  rx="2" fill="#16a34a" opacity="0.3"/>
  <rect x="880" y="436" width="10" height="50"  rx="2" fill="#475569" opacity="0.3"/>

  <defs><marker id="seq" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#334155"/></marker></defs>

  <!-- 1 -->
  <line x1="90" y1="106" x2="238" y2="106" stroke="#334155" stroke-width="1.5" marker-end="url(#seq)"/>
  <text x="160" y="101" text-anchor="middle" fill="#334155" font-size="10">1: POST /process_risks/add</text>
  <text x="160" y="114" text-anchor="middle" fill="#64748b" font-size="9">{probability, vulnerability_level, impact, control_effectiveness, ...}</text>

  <!-- 2 role check -->
  <rect x="245" y="124" width="155" height="24" rx="3" fill="#fef3c7" stroke="#d97706"/>
  <text x="323" y="140" text-anchor="middle" fill="#92400e" font-size="10">@risk_editor_required ✓</text>

  <!-- 3 -> risk_service -->
  <line x1="250" y1="161" x2="398" y2="161" stroke="#334155" stroke-width="1.5" marker-end="url(#seq)"/>
  <text x="325" y="156" text-anchor="middle" fill="#334155" font-size="10">2: calculate_event_potentiality(P, V)</text>

  <!-- 4 return -->
  <line x1="398" y1="191" x2="250" y2="191" stroke="#64748b" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#seq)"/>
  <text x="325" y="186" text-anchor="middle" fill="#64748b" font-size="10">potentiality = max(P+V−1, 0)</text>

  <!-- 5 -> risk_service metrics -->
  <line x1="250" y1="216" x2="398" y2="216" stroke="#334155" stroke-width="1.5" marker-end="url(#seq)"/>
  <text x="325" y="211" text-anchor="middle" fill="#334155" font-size="10">3: calculate_process_risk_metrics()</text>

  <!-- 6 metrics return -->
  <line x1="398" y1="246" x2="250" y2="246" stroke="#64748b" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#seq)"/>
  <text x="325" y="241" text-anchor="middle" fill="#64748b" font-size="10">{risk_level, residual_risk, risk_reduction, priority}</text>

  <!-- 7 -> AI -->
  <line x1="250" y1="276" x2="558" y2="276" stroke="#334155" stroke-width="1.5" marker-end="url(#seq)"/>
  <text x="404" y="271" text-anchor="middle" fill="#334155" font-size="10">4: recommend_process_risk(risk_data)</text>

  <!-- 8 AI return -->
  <line x1="558" y1="316" x2="250" y2="316" stroke="#64748b" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#seq)"/>
  <text x="404" y="311" text-anchor="middle" fill="#64748b" font-size="10">ai_recommendation: "Control strengthening required..."</text>

  <!-- 9 -> SQLite INSERT -->
  <line x1="250" y1="346" x2="718" y2="346" stroke="#334155" stroke-width="1.5" marker-end="url(#seq)"/>
  <text x="484" y="341" text-anchor="middle" fill="#334155" font-size="10">5: INSERT INTO process_risks VALUES (...)</text>

  <!-- 10 DB return -->
  <line x1="718" y1="376" x2="250" y2="376" stroke="#64748b" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#seq)"/>
  <text x="484" y="371" text-anchor="middle" fill="#64748b" font-size="10">new_id = 23</text>

  <!-- 11 -> audit_log -->
  <line x1="250" y1="406" x2="878" y2="406" stroke="#334155" stroke-width="1.5" marker-end="url(#seq)"/>
  <text x="564" y="401" text-anchor="middle" fill="#334155" font-size="10">6: INSERT INTO audit_log {action:'create', after_data: JSON}</text>

  <!-- 12 -> workflow record -->
  <line x1="250" y1="436" x2="718" y2="436" stroke="#334155" stroke-width="1.5" marker-end="url(#seq)"/>
  <text x="484" y="431" text-anchor="middle" fill="#334155" font-size="10">7: INSERT INTO process_risk_workflow {status:'Draft'}</text>

  <!-- 13 flash + redirect -->
  <rect x="245" y="466" width="155" height="24" rx="3" fill="#ecfdf5" stroke="#16a34a"/>
  <text x="323" y="482" text-anchor="middle" fill="#065f46" font-size="10">flash("Risk record added")</text>

  <!-- 14 return to user -->
  <line x1="238" y1="502" x2="90" y2="502" stroke="#64748b" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#seq)"/>
  <text x="160" y="496" text-anchor="middle" fill="#64748b" font-size="10">8: redirect → /process_risks (HTTP 302)</text>

  <!-- step numbers on left -->
  <text x="15" y="109" fill="#94a3b8" font-size="9">①</text>
  <text x="15" y="164" fill="#94a3b8" font-size="9">②</text>
  <text x="15" y="219" fill="#94a3b8" font-size="9">③</text>
  <text x="15" y="279" fill="#94a3b8" font-size="9">④</text>
  <text x="15" y="349" fill="#94a3b8" font-size="9">⑤</text>
  <text x="15" y="409" fill="#94a3b8" font-size="9">⑥</text>
  <text x="15" y="439" fill="#94a3b8" font-size="9">⑦</text>
  <text x="15" y="505" fill="#94a3b8" font-size="9">⑧</text>
</svg>
