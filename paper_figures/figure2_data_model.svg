  <text x="300" y="432" fill="#64748b">FK process_risk_id → process_risks</text>
  <text x="300" y="446" fill="#64748b">FK expert_id → experts</text>
  <text x="300" y="460" fill="#334155">probability, vulnerability_level</text>
  <text x="300" y="474" fill="#334155">impact, confidence, evidence</text>

