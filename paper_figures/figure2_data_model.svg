  <rect x="956" y="454" width="120" height="56" rx="5" fill="white" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="956" y="454" width="120" height="18" rx="5" fill="#94a3b8"/>
  <text x="1016" y="466" text-anchor="middle" fill="white" font-weight="700">criteria_weights</text>
