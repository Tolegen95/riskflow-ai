  <rect x="548" y="30" width="252" height="300" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="558" y="46" font-weight="700" font-size="10" fill="#166534">USERS / AUDIT</text>

  <rect x="560" y="54" width="228" height="90" rx="5" fill="white" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="560" y="54" width="228" height="18" rx="5" fill="#16a34a"/>
  <text x="674" y="66" text-anchor="middle" fill="white" font-weight="700">users</text>
  <text x="568" y="84" fill="#334155">PK id</text>
  <text x="568" y="98" fill="#334155">username UNIQUE, password_hash</text>
  <text x="568" y="112" fill="#334155">role CHECK IN (5 roles)</text>
  <text x="568" y="126" fill="#64748b">FK expert_id → experts</text>

  <rect x="560" y="158" width="228" height="56" rx="5" fill="white" stroke="#16a34a" stroke-width="1.5"/>
