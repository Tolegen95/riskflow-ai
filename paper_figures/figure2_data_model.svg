  <text x="568" y="258" fill="#334155">PK id</text>
  <text x="568" y="272" fill="#64748b">FK user_id → users</text>
  <text x="568" y="286" fill="#334155">action, entity_type, entity_id</text>
  <text x="568" y="300" fill="#334155">before_data / after_data (JSON), created_at</text>

