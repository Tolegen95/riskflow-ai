<svg viewBox="0 0 1100 700" width="1100" height="700" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif" font-size="11">
  <rect x="0" y="0" width="1100" height="700" fill="#f8fafc" rx="10"/>
  <text x="550" y="18" text-anchor="middle" font-size="13" font-weight="800" fill="#0f172a">Figure 2. Simplified entity-relationship model</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#94a3b8"/></marker>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#2563eb"/></marker>
  </defs>

  <!-- GROUP A: ORGANIZATIONS & PROCESSES -->
  <rect x="12" y="30" width="252" height="472" rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="22" y="46" font-weight="700" font-size="10" fill="#1d4ed8">ORGANIZATIONS &amp; PROCESSES</text>

  <rect x="24" y="54" width="228" height="72" rx="5" fill="white" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="24" y="54" width="228" height="18" rx="5" fill="#2563eb"/>
  <text x="138" y="66" text-anchor="middle" fill="white" font-weight="700">companies</text>
  <text x="32" y="82" fill="#334155">PK id</text>
  <text x="32" y="96" fill="#334155">name UNIQUE</text>
  <text x="32" y="110" fill="#334155">industry, description, created_at</text>

  <rect x="24" y="140" width="228" height="100" rx="5" fill="white" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="24" y="140" width="228" height="18" rx="5" fill="#2563eb"/>
  <text x="138" y="152" text-anchor="middle" fill="white" font-weight="700">processes</text>
  <text x="32" y="170" fill="#334155">PK id</text>
  <text x="32" y="184" fill="#64748b">FK company_id → companies</text>
  <text x="32" y="198" fill="#64748b">FK owner_user_id → users</text>
  <text x="32" y="212" fill="#334155">name, process_type, owner</text>
  <text x="32" y="226" fill="#334155">input_data, output_data, regulations</text>

  <rect x="24" y="254" width="228" height="82" rx="5" fill="white" stroke="#2563eb" stroke-width="1.5"/>
  <rect x="24" y="254" width="228" height="18" rx="5" fill="#2563eb"/>
  <text x="138" y="266" text-anchor="middle" fill="white" font-weight="700">subprocesses</text>
  <text x="32" y="284" fill="#334155">PK id</text>
  <text x="32" y="298" fill="#64748b">FK process_id → processes</text>
  <text x="32" y="312" fill="#334155">name, description</text>
  <text x="32" y="326" fill="#334155">responsible_person, order_index</text>

  <rect x="24" y="350" width="228" height="56" rx="5" fill="white" stroke="#0891b2" stroke-width="1.5"/>
  <rect x="24" y="350" width="228" height="18" rx="5" fill="#0891b2"/>
  <text x="138" y="362" text-anchor="middle" fill="white" font-weight="700">process_assets [junction]</text>
  <text x="32" y="380" fill="#64748b">FK process_id → processes</text>
  <text x="32" y="394" fill="#64748b">FK asset_id → assets</text>

  <rect x="24" y="420" width="228" height="68" rx="5" fill="white" stroke="#0891b2" stroke-width="1.5"/>
  <rect x="24" y="420" width="228" height="18" rx="5" fill="#0891b2"/>
  <text x="138" y="432" text-anchor="middle" fill="white" font-weight="700">process_bpmn</text>
  <text x="32" y="450" fill="#334155">PK id</text>
  <text x="32" y="464" fill="#64748b">FK process_id → processes</text>
  <text x="32" y="478" fill="#334155">bpmn_json, bpmn_xml, created_at</text>

  <!-- GROUP B: RISK RECORDS / WORKFLOW -->
  <rect x="280" y="30" width="252" height="472" rx="8" fill="#fef9ef" stroke="#fde68a" stroke-width="1.5"/>
  <text x="290" y="46" font-weight="700" font-size="10" fill="#92400e">RISK RECORDS / WORKFLOW</text>

  <rect x="292" y="54" width="228" height="210" rx="5" fill="white" stroke="#d97706" stroke-width="2"/>
  <rect x="292" y="54" width="228" height="18" rx="5" fill="#d97706"/>
  <text x="406" y="66" text-anchor="middle" fill="white" font-weight="800">process_risks  ★ core</text>
  <text x="300" y="84" fill="#334155">PK id</text>
  <text x="300" y="98" fill="#64748b">FK process_id, subprocess_id</text>
  <text x="300" y="112" fill="#64748b">FK asset_id, threat_id, vulnerability_id</text>
  <text x="300" y="126" fill="#64748b">FK control_measure_id, risk_owner_user_id</text>
  <text x="300" y="140" fill="#334155">probability, vulnerability_level, impact</text>
  <text x="300" y="154" fill="#334155">control_effectiveness, cost</text>
  <text x="300" y="168" fill="#334155">risk_level, residual_risk, risk_reduction</text>
  <text x="300" y="182" fill="#334155">risk_category, priority</text>
  <text x="300" y="196" fill="#334155">status, due_date, ai_recommendation</text>
  <text x="300" y="210" fill="#334155">confidence, evidence  [30 columns total]</text>

  <rect x="292" y="278" width="228" height="96" rx="5" fill="white" stroke="#d97706" stroke-width="1.5"/>
  <rect x="292" y="278" width="228" height="18" rx="5" fill="#d97706"/>
  <text x="406" y="290" text-anchor="middle" fill="white" font-weight="700">process_risk_workflow</text>
  <text x="300" y="308" fill="#334155">PK id</text>
  <text x="300" y="322" fill="#64748b">FK process_risk_id → process_risks</text>
  <text x="300" y="336" fill="#64748b">FK user_id → users</text>
  <text x="300" y="350" fill="#334155">action, from_status, to_status</text>
  <text x="300" y="364" fill="#334155">comment, username, role</text>

  <rect x="292" y="388" width="228" height="96" rx="5" fill="white" stroke="#d97706" stroke-width="1.5"/>
  <rect x="292" y="388" width="228" height="18" rx="5" fill="#d97706"/>
  <text x="406" y="400" text-anchor="middle" fill="white" font-weight="700">risk_expert_assessments</text>
