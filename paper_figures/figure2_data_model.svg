  <text x="964" y="344" fill="#334155">PK id, name UNIQUE</text>

  <rect x="828" y="384" width="248" height="56" rx="5" fill="white" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="828" y="384" width="248" height="18" rx="5" fill="#94a3b8"/>
